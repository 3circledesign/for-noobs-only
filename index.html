<title>ONENNABE — Setup Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #16161f;
    --accent: #00e5ff;
    --accent-dim: #00e5ff33;
    --accent-glow: #00e5ff66;
    --accent-warm: #ff6b35;
    --accent-green: #00ff88;
    --accent-red: #ff3366;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-dim: #55556a;
    --border: #2a2a3a;
    --border-accent: #00e5ff22;
    --radius: 12px;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body); background: var(--bg-primary);
    color: var(--text-primary); min-height: 100vh;
    overflow-x: hidden; font-size: 17px; line-height: 1.6;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image: linear-gradient(var(--border-accent) 1px, transparent 1px), linear-gradient(90deg, var(--border-accent) 1px, transparent 1px);
    background-size: 60px 60px; z-index: 0; opacity: 0.4;
  }
  .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(150px); opacity: 0.15; z-index: 0; pointer-events: none; }
  .bg-glow.g1 { top: -200px; left: -100px; background: var(--accent); }
  .bg-glow.g2 { bottom: -200px; right: -100px; background: var(--accent-warm); }
  .app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 24px; min-height: 100vh; }

  .header { text-align: center; margin-bottom: 48px; animation: fadeInDown .8s ease; }
  .header .logo { font-family: var(--font-display); font-size: 2.2rem; font-weight: 900; letter-spacing: 6px; background: linear-gradient(135deg, var(--accent), #80f0ff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .header .sub { font-family: var(--font-mono); font-size: .8rem; color: var(--text-secondary); letter-spacing: 3px; text-transform: uppercase; }

  .lang { position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg-card); box-shadow: 0 4px 20px rgba(0,0,0,.4); }
  .lang button { font-family: var(--font-mono); font-size: .72rem; font-weight: 600; letter-spacing: 1.5px; padding: 10px 18px; border: none; cursor: pointer; color: var(--text-dim); background: transparent; transition: all .3s; text-transform: uppercase; }
  .lang button.on { background: var(--accent); color: var(--bg-primary); }
  .lang button:not(.on):hover { color: var(--accent); background: var(--accent-dim); }

  .prog-wrap { margin-bottom: 40px; animation: fadeIn .6s ease .2s both; }
  .prog { display: flex; align-items: center; justify-content: center; }
  .prog-step { display: flex; flex-direction: column; align-items: center; z-index: 2; }
  .dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .75rem; font-weight: 600; color: var(--text-dim); transition: all .4s; }
  .dot.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); box-shadow: 0 0 20px var(--accent-dim); }
  .dot.done { border-color: var(--accent-green); background: #00ff8822; color: var(--accent-green); }
  .dot-label { font-size: .65rem; font-family: var(--font-mono); color: var(--text-dim); margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; transition: color .3s; white-space: nowrap; }
  .line { width: 50px; height: 2px; background: var(--border); margin: 0 4px; margin-bottom: 22px; transition: background .4s; }
  .line.done { background: var(--accent-green); }

  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 40px; position: relative; overflow: hidden; animation: slideUp .5s ease; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .tag { font-family: var(--font-mono); font-size: .7rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; opacity: .8; }
  .ttl { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; letter-spacing: 1px; line-height: 1.3; }
  .body p { color: var(--text-secondary); margin-bottom: 16px; font-size: 1.05rem; }
  .body strong { color: var(--text-primary); font-weight: 600; }
  .body .hi { background: var(--accent-dim); border-left: 3px solid var(--accent); padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 20px 0; font-family: var(--font-mono); font-size: .85rem; color: var(--accent); line-height: 1.7; }
  .body .warn { background: #ff336615; border-left: 3px solid var(--accent-red); padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 20px 0; color: #ff8899; font-size: .95rem; }
  .body .danger { background: #ff000020; border: 2px solid var(--accent-red); padding: 20px 24px; border-radius: 10px; margin: 20px 0; color: #ff6680; font-size: 1rem; text-align: center; font-weight: 600; }
  .body ul { list-style: none; padding: 0; margin: 16px 0; }
  .body ul li { color: var(--text-secondary); padding: 8px 0 8px 28px; position: relative; font-size: 1rem; }
  .body ul li::before { content: '▸'; position: absolute; left: 8px; color: var(--accent); font-size: .9rem; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 36px; gap: 16px; }
  .btn { font-family: var(--font-display); font-size: .8rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 8px; padding: 14px 32px; cursor: pointer; transition: all .3s; position: relative; overflow: hidden; }
  .btn-p { background: linear-gradient(135deg, var(--accent), #00b8d4); color: var(--bg-primary); box-shadow: 0 4px 20px var(--accent-dim); }
  .btn-p:hover { transform: translateY(-2px); box-shadow: 0 6px 30px var(--accent-glow); }
  .btn-s { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-s:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; transform: none !important; }

  .quiz { display: none; }
  .qh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .qh-text { font-family: var(--font-mono); font-size: .8rem; color: var(--text-secondary); letter-spacing: 1px; }
  .qh-score { font-family: var(--font-mono); font-size: .8rem; color: var(--accent); letter-spacing: 1px; }
  .qnum { font-family: var(--font-display); font-size: .75rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 12px; }
  .qtxt { font-size: 1.2rem; font-weight: 600; margin-bottom: 28px; line-height: 1.5; }
  .opts { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .opt { display: flex; align-items: center; gap: 16px; width: 100%; padding: 16px 20px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-family: var(--font-body); font-size: 1rem; font-weight: 500; cursor: pointer; transition: all .25s; text-align: left; }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .opt .ol { width: 32px; height: 32px; border-radius: 8px; background: var(--bg-primary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .8rem; font-weight: 600; color: var(--text-dim); flex-shrink: 0; transition: all .25s; }
  .opt:hover:not(:disabled) .ol { border-color: var(--accent); color: var(--accent); }
  .opt.ok { border-color: var(--accent-green) !important; background: #00ff8815 !important; }
  .opt.ok .ol { background: var(--accent-green) !important; color: var(--bg-primary) !important; border-color: var(--accent-green) !important; }
  .opt.no { border-color: var(--accent-red) !important; background: #ff336615 !important; }
  .opt.no .ol { background: var(--accent-red) !important; color: #fff !important; border-color: var(--accent-red) !important; }
  .opt:disabled { cursor: default; }
  .fb { padding: 12px 16px; border-radius: 8px; font-family: var(--font-mono); font-size: .85rem; margin-bottom: 20px; display: none; animation: fadeIn .3s; }
  .fb.ok { display: block; background: #00ff8815; color: var(--accent-green); border: 1px solid #00ff8833; }
  .fb.no { display: block; background: #ff336615; color: var(--accent-red); border: 1px solid #ff336633; }
  .qbar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .qbar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-green)); border-radius: 2px; transition: width .5s; width: 0%; }

  .res { display: none; }
  .res-s { text-align: center; padding: 40px 0; }
  .ring { width: 160px; height: 160px; margin: 0 auto 24px; position: relative; }
  .ring svg { transform: rotate(-90deg); width: 160px; height: 160px; }
  .ring circle { fill: none; stroke-width: 8; stroke-linecap: round; }
  .ring .rb { stroke: var(--border); }
  .ring .rf { stroke: var(--accent-green); stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 1.5s ease; }
  .ring .rf.fail { stroke: var(--accent-red); }
  .sv { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: var(--font-display); font-size: 2.5rem; font-weight: 900; }
  .sv small { font-size: 1rem; color: var(--text-dim); font-weight: 400; }
  .rmsg { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; letter-spacing: 2px; text-align: center; margin-bottom: 12px; }
  .rdesc { color: var(--text-secondary); text-align: center; font-size: 1rem; margin-bottom: 36px; }
  .dl-box { text-align: center; padding: 32px; background: #00ff8808; border: 1px dashed #00ff8844; border-radius: var(--radius); margin-bottom: 24px; }
  .dl-box .ico { font-size: 2.5rem; margin-bottom: 12px; }
  .dl-link { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-display); font-size: .85rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(135deg, var(--accent-green), #00cc6a); color: var(--bg-primary); text-decoration: none; padding: 16px 40px; border-radius: 8px; transition: all .3s; box-shadow: 0 4px 20px #00ff8833; }
  .dl-link:hover { transform: translateY(-2px); box-shadow: 0 6px 30px #00ff8855; }
  .fail-box { text-align: center; padding: 32px; background: #ff336610; border: 1px dashed #ff336644; border-radius: var(--radius); margin-bottom: 24px; }

  .hidden { display: none !important; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px) } to { opacity: 1; transform: translateY(0) } }
  @media (max-width: 640px) {
    .app { padding: 24px 16px; } .card { padding: 32px 24px; }
    .header .logo { font-size: 1.6rem; letter-spacing: 4px; }
    .line { width: 24px; } .dot-label { font-size: .55rem; } .dot { width: 30px; height: 30px; font-size: .65rem; }
    .nav { flex-direction: column; } .nav .btn { width: 100%; text-align: center; }
    .lang { top: 12px; right: 12px; } .lang button { padding: 8px 14px; font-size: .65rem; }
  }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>

      <div class="fail-box hidden" id="failBox">
        <p id="failLabel" style="color:var(--accent-red);margin-bottom:16px;font-family:var(--font-mono);font-size:.8rem;letter-spacing:2px"></p>
        <p id="failDesc" style="color:var(--text-secondary);margin-bottom:20px"></p>
        <button class="btn btn-p" id="retryBtn" onclick="resetAll()"></button>
      </div>
    </div>
  </div>
</div>

      { tag:"Step 1 of 5", title:"What is Denuvo & Game Bypass", content:`

      // PAGE 2 — Requirements (MUST READ)

// STATE
let lang='en', pg=0, qi=0, sc=0, ans=false, qOn=false, done=false;
const TP=C.pages.en.length, TQ=C.questions.en.length, TS=TP+1;
const L=()=>C.ui[lang], P=()=>C.pages[lang], Q=()=>C.questions[lang];
const $=id=>document.getElementById(id);

function setLang(l){
  lang=l;
  $('lEN').classList.toggle('on',l==='en');
  $('lBM').classList.toggle('on',l==='bm');
  $('hSub').textContent=L().sub;
  if(done) refreshRes();
  else if(qOn) refreshQUI();
  else { buildProg(); renderPg(); }
}

function refreshQUI(){
  $('qProg').textContent=L().qOf(qi+1,TQ);
  $('qScore').textContent=L().sc(sc);
  $('qNum').textContent=L().qN(qi+1);
  $('qTxt').textContent=Q()[qi].q;
  if(!ans){
    const lt=['A','B','C','D'];
    $('qOpts').innerHTML=Q()[qi].o.map((o,i)=>`<button class="opt" onclick="pick(${i})" id="o${i}"><span class="ol">${lt[i]}</span><span>${o}</span></button>`).join('');
  }
  const b=$('bNextQ');
  if(!b.classList.contains('hidden')) b.textContent=qi===TQ-1?L().viewR:L().nextQ;
}

function refreshRes(){
  const p=sc>=C.pass;
  $('rMsg').textContent=p?L().granted:L().denied;
  $('rDesc').textContent=p?L().passD(sc,TQ):L().failD(sc,TQ,C.pass);
  if(p){ $('dlLabel').textContent=L().dlOpen; $('dlBtn').textContent=L().dlBtn; }
  else { $('failLabel').textContent=L().dlLock; $('failDesc').innerHTML=L().failMore(C.pass); $('retryBtn').textContent=L().retry; }
}

function buildProg(){
  const c=$('prog'); c.innerHTML='';
  for(let i=0;i<TS;i++){
    if(i>0){ const ln=document.createElement('div'); ln.className='line'; ln.id='ln'+i; c.appendChild(ln); }
    const s=document.createElement('div'); s.className='prog-step';
    const d=document.createElement('div'); d.className='dot'; d.id='d'+i; d.textContent=i<TP?(i+1):'?';
    const lb=document.createElement('div'); lb.className='dot-label'; lb.textContent=i<TP?L().sL(i+1):L().qL;
    s.appendChild(d); s.appendChild(lb); c.appendChild(s);
  }
  updProg();
}

function updProg(){
  for(let i=0;i<TS;i++){
    const d=$('d'+i); if(!d)return;
    d.classList.remove('active','done');
    if(i<pg){ d.classList.add('done'); d.textContent='✓'; }
    else if(i===pg){ d.classList.add('active'); d.textContent=i<TP?(i+1):'?'; }
    else d.textContent=i<TP?(i+1):'?';
    if(i>0) $('ln'+i).classList.toggle('done',i<=pg);
  }
}

function renderPg(){
  const p=P()[pg];
  $('pTag').textContent=p.tag; $('pTtl').textContent=p.title; $('pBody').innerHTML=p.content;
  $('bPrev').textContent=L().back; $('bPrev').disabled=pg===0;
  $('bNext').textContent=pg===TP-1?L().startQ:L().next;
  const c=$('pCard'); c.style.animation='none'; c.offsetHeight; c.style.animation='slideUp .5s ease';
  updProg();
}

function nextPage(){
  if(pg<TP-1){ pg++; renderPg(); }
  else { pg=TP; qOn=true; updProg(); $('tutSec').classList.add('hidden'); $('qSec').style.display='block'; renderQ(); }
}
function prevPage(){ if(pg>0){ pg--; renderPg(); } }

function renderQ(){
  const q=Q()[qi]; ans=false;
  $('qProg').textContent=L().qOf(qi+1,TQ);
  $('qScore').textContent=L().sc(sc);
  $('qBar').style.width=`${(qi/TQ)*100}%`;
  $('qNum').textContent=L().qN(qi+1);
  $('qTxt').textContent=q.q;
  const lt=['A','B','C','D'];
  $('qOpts').innerHTML=q.o.map((o,i)=>`<button class="opt" onclick="pick(${i})" id="o${i}"><span class="ol">${lt[i]}</span><span>${o}</span></button>`).join('');
  $('qFb').className='fb'; $('qFb').textContent='';
  $('bNextQ').classList.add('hidden');
  const a=$('qArea'); a.style.animation='none'; a.offsetHeight; a.style.animation='slideUp .4s ease';
}

function pick(i){
  if(ans)return; ans=true;
  const cor=Q()[qi].a, fb=$('qFb');
  Q()[qi].o.forEach((_,j)=>$('o'+j).disabled=true);
  $('o'+cor).classList.add('ok');
  if(i===cor){ sc++; fb.className='fb ok'; fb.textContent=L().ok; }
  else { $('o'+i).classList.add('no'); fb.className='fb no'; fb.textContent=L().no(Q()[qi].o[cor]); }
  $('qScore').textContent=L().sc(sc);
  const b=$('bNextQ'); b.classList.remove('hidden');
  if(qi===TQ-1){ b.textContent=L().viewR; b.onclick=showRes; }
  else { b.textContent=L().nextQ; b.onclick=nextQ; }
}
function nextQ(){ qi++; if(qi<TQ) renderQ(); }

function showRes(){
  done=true;
  $('qSec').style.display='none'; $('rSec').style.display='block'; $('progWrap').classList.add('hidden');
  const p=sc>=C.pass;
  $('rScore').textContent=sc;
  const ring=$('rFill'), circ=2*Math.PI*70, off=circ-(sc/TQ)*circ;
  ring.classList.toggle('fail',!p);
  setTimeout(()=>ring.style.strokeDashoffset=off,100);
  if(p){
    $('rMsg').textContent=L().granted; $('rMsg').style.color='var(--accent-green)';
    $('rDesc').textContent=L().passD(sc,TQ);
    $('dlBox').classList.remove('hidden'); $('failBox').classList.add('hidden');
    $('dlLabel').textContent=L().dlOpen;
    $('dlBtn').href=C.dlURL; $('dlBtn').textContent=L().dlBtn;
  } else {
    $('rMsg').textContent=L().denied; $('rMsg').style.color='var(--accent-red)';
    $('rDesc').textContent=L().failD(sc,TQ,C.pass);
    $('failBox').classList.remove('hidden'); $('dlBox').classList.add('hidden');
    $('failLabel').textContent=L().dlLock;
    $('failDesc').innerHTML=L().failMore(C.pass);
    $('retryBtn').textContent=L().retry;
  }
}

function resetAll(){
  pg=0;qi=0;sc=0;ans=false;qOn=false;done=false;
  $('rSec').style.display='none'; $('qSec').style.display='none';
  $('tutSec').classList.remove('hidden'); $('progWrap').classList.remove('hidden');
  $('dlBox').classList.add('hidden'); $('failBox').classList.add('hidden');
  const r=$('rFill'); r.style.strokeDashoffset=440; r.classList.remove('fail');
  buildProg(); renderPg();
}

buildProg(); renderPg();
</script>
